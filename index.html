<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mr.Meltdown's Vault</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="styles.css">
  <script src="https://unpkg.com/lucide@latest"></script>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-placeholder" crossorigin="anonymous"></script>
</head>
<body class="min-h-screen font-sans selection:bg-fuchsia-500/30 selection:text-white">

  <!-- Navbar -->
  <nav class="sticky top-0 z-50 w-full bg-zinc-900 border-b-4 border-black shadow-[0_4px_0_0_rgba(0,0,0,1)]">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex items-center justify-between h-20">
        <a href="index.html" class="flex items-center gap-3 group hover:-translate-y-1 transition-transform">
          <div class="p-2 bg-yellow-400 brutal-box -rotate-6 group-hover:rotate-0">
            <i data-lucide="gamepad-2" class="w-8 h-8 text-black"></i>
          </div>
          <span class="graffiti-text text-3xl text-yellow-400 drop-shadow-[2px_2px_0_#000] -rotate-2 mt-2">
            Mr.Meltdown's <span class="text-fuchsia-500">Vault</span>
          </span>
        </a>

        <div class="flex-1 max-w-md mx-8">
          <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
              <i data-lucide="search" class="h-5 w-5 text-black font-bold"></i>
            </div>
            <input
              type="text"
              id="searchInput"
              class="block w-full pl-10 pr-3 py-3 brutal-box bg-white text-black font-bold placeholder-zinc-500 focus:outline-none focus:ring-0 sm:text-sm"
              placeholder="SEARCH THE VAULT..."
            />
          </div>
        </div>

        <div class="flex items-center gap-4">
          <button
            id="panicBtn"
            class="flex items-center gap-2 px-5 py-2.5 bg-red-500 text-white brutal-box font-bold text-lg -rotate-2 hover:rotate-0"
            title="Panic Button (Esc)"
          >
            <i data-lucide="shield-alert" class="w-5 h-5"></i>
            <span class="hidden sm:inline uppercase tracking-wider">Panic</span>
          </button>
        </div>
      </div>
    </div>
  </nav>

  <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
    <div class="mb-10 w-full h-[90px] md:h-[120px]">
      <!-- AdBanner -->
      <div class="relative overflow-hidden bg-zinc-800 brutal-box flex items-center justify-center w-full h-full">
        <div class="absolute inset-0 flex items-center justify-center bg-zinc-900 pointer-events-none z-0">
          <div class="border-4 border-dashed border-zinc-700 w-[95%] h-[90%] flex items-center justify-center">
            <span class="graffiti-text text-zinc-700 text-2xl -rotate-2">AD SPACE</span>
          </div>
        </div>
      </div>
    </div>

    <div class="flex items-center justify-between mb-10">
      <h1 id="pageTitle" class="graffiti-text text-4xl sm:text-5xl text-cyan-400 drop-shadow-[3px_3px_0_#000] -rotate-1 inline-block">
        Featured Games
      </h1>
      <div id="gameCount" class="text-sm text-black bg-yellow-400 brutal-box px-3 py-1 font-bold rotate-2">
        0 GAMES
      </div>
    </div>

    <div id="gamesGrid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-6 sm:gap-8">
      <!-- Games will be injected here -->
    </div>

    <div id="noResults" class="hidden text-center py-20 bg-zinc-900 brutal-box max-w-2xl mx-auto -rotate-1">
      <p class="graffiti-text text-3xl text-zinc-500">No games found matching "<span id="searchQueryText"></span>"</p>
    </div>

    <div class="mt-16 w-full h-[90px] md:h-[120px]">
      <!-- AdBanner -->
      <div class="relative overflow-hidden bg-zinc-800 brutal-box flex items-center justify-center w-full h-full">
        <div class="absolute inset-0 flex items-center justify-center bg-zinc-900 pointer-events-none z-0">
          <div class="border-4 border-dashed border-zinc-700 w-[95%] h-[90%] flex items-center justify-center">
            <span class="graffiti-text text-zinc-700 text-2xl -rotate-2">AD SPACE</span>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script src="games.js"></script>
  <script src="app.js"></script>
</body>
</html>
